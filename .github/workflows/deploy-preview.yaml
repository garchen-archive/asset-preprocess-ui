name: Deploy PR Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check || npx tsc --noEmit

      - name: Deploy Preview
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        with:
          deploy_pr_preview: "true"
          token: ${{ secrets.DO_ACCESS_TOKEN }}
          print_build_logs: "true"
          print_deploy_logs: "true"
          app_spec_location: .do/app.preview.yaml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          BACKBLAZE_ENDPOINT: ${{ secrets.BACKBLAZE_ENDPOINT }}
          BACKBLAZE_REGION: ${{ secrets.BACKBLAZE_REGION }}
          BACKBLAZE_KEY_ID: ${{ secrets.BACKBLAZE_KEY_ID }}
          BACKBLAZE_APPLICATION_KEY: ${{ secrets.BACKBLAZE_APPLICATION_KEY }}
          BACKBLAZE_BUCKET_NAME: ${{ secrets.BACKBLAZE_BUCKET_NAME }}
          PIPELINE_API_URL: ${{ secrets.PIPELINE_API_URL }}
          PIPELINE_API_KEY: ${{ secrets.PIPELINE_API_KEY }}

      - name: Comment on PR (Success)
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed at ${{ fromJson(steps.deploy.outputs.app).live_url }}`
            })

      - name: Comment on PR (Failure)
        if: failure()
        uses: actions/github-script@v7
        env:
          BUILD_LOGS: ${{ steps.deploy.outputs.build_logs }}
          DEPLOY_LOGS: ${{ steps.deploy.outputs.deploy_logs }}
        with:
          script: |
            const { BUILD_LOGS, DEPLOY_LOGS } = process.env
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Preview deployment failed. [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

              <details>
              <summary>Build logs</summary>

              \`\`\`
              ${BUILD_LOGS || 'No build logs available'}
              \`\`\`
              </details>

              <details>
              <summary>Deploy logs</summary>

              \`\`\`
              ${DEPLOY_LOGS || 'No deploy logs available'}
              \`\`\`
              </details>`
            })
