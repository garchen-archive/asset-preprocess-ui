name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push-deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check || npx tsc --noEmit

      - name: Run linter
        run: npm run lint || true

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 3600

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.5.0
        with:
          context: .
          push: true
          tags: |
            registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/garchen-archive:webui-${{ steps.sha.outputs.short }}
            registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/garchen-archive:webui-staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update app spec with image tag
        run: |
          sed -i 's/tag: webui-staging/tag: webui-${{ steps.sha.outputs.short }}/g' .do/app.staging.yaml

      - name: Deploy to Staging
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
          app_spec_location: .do/app.staging.yaml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          BACKBLAZE_ENDPOINT: ${{ secrets.BACKBLAZE_ENDPOINT }}
          BACKBLAZE_REGION: ${{ secrets.BACKBLAZE_REGION }}
          BACKBLAZE_KEY_ID: ${{ secrets.BACKBLAZE_KEY_ID }}
          BACKBLAZE_APPLICATION_KEY: ${{ secrets.BACKBLAZE_APPLICATION_KEY }}
          BACKBLAZE_BUCKET_NAME: ${{ secrets.BACKBLAZE_BUCKET_NAME }}
          PIPELINE_API_URL: ${{ secrets.PIPELINE_API_URL }}
          PIPELINE_API_KEY: ${{ secrets.PIPELINE_API_KEY }}

      - name: Summary
        run: |
          echo "### Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** webui-${{ steps.sha.outputs.short }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
