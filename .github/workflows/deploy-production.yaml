name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-to-production" to confirm'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-to-production" ]; then
            echo "::error::Confirmation text does not match. Deployment cancelled."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check || npx tsc --noEmit

      - name: Deploy to Production
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          BACKBLAZE_ENDPOINT: ${{ secrets.BACKBLAZE_ENDPOINT }}
          BACKBLAZE_REGION: ${{ secrets.BACKBLAZE_REGION }}
          BACKBLAZE_KEY_ID: ${{ secrets.BACKBLAZE_KEY_ID }}
          BACKBLAZE_APPLICATION_KEY: ${{ secrets.BACKBLAZE_APPLICATION_KEY }}
          BACKBLAZE_BUCKET_NAME: ${{ secrets.BACKBLAZE_BUCKET_NAME }}
