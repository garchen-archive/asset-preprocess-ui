name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version and SHA
        id: info
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 3600

      - name: Re-tag image with version
        run: |
          REGISTRY="registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}"
          SHA_TAG="webui-${{ steps.info.outputs.short_sha }}"
          VERSION_TAG="webui-${{ steps.info.outputs.tag }}"

          echo "Pulling $REGISTRY/garchen-archive:$SHA_TAG"
          docker pull $REGISTRY/garchen-archive:$SHA_TAG

          echo "Tagging as $VERSION_TAG"
          docker tag $REGISTRY/garchen-archive:$SHA_TAG $REGISTRY/garchen-archive:$VERSION_TAG

          echo "Pushing $VERSION_TAG"
          docker push $REGISTRY/garchen-archive:$VERSION_TAG

      - name: Update app spec with version tag
        run: |
          sed -i 's/tag: webui-production/tag: webui-${{ steps.info.outputs.tag }}/g' .do/app.yaml

      - name: Deploy to Production
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          BACKBLAZE_ENDPOINT: ${{ secrets.BACKBLAZE_ENDPOINT }}
          BACKBLAZE_REGION: ${{ secrets.BACKBLAZE_REGION }}
          BACKBLAZE_KEY_ID: ${{ secrets.BACKBLAZE_KEY_ID }}
          BACKBLAZE_APPLICATION_KEY: ${{ secrets.BACKBLAZE_APPLICATION_KEY }}
          BACKBLAZE_BUCKET_NAME: ${{ secrets.BACKBLAZE_BUCKET_NAME }}

      - name: Summary
        run: |
          echo "### Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.info.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source image:** webui-${{ steps.info.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tagged as:** webui-${{ steps.info.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
