name: garchen-archive-webui-prod
region: nyc

services:
  - name: garchen-archive-webui
    # Production uses pre-built images from DOCR
    image:
      registry_type: DOCR
      repository: garchen-archive
      tag: webui-latest

    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb

    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    envs:
      # Non-sensitive configuration
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

      # Database (injected from GitHub Secrets)
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${DATABASE_URL}

      # Auth
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: ${APP_URL}
      - key: NEXTAUTH_SECRET
        scope: RUN_TIME
        value: ${NEXTAUTH_SECRET}

      # App URL
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_TIME
        value: ${APP_URL}

      # Backblaze B2 Storage
      - key: BACKBLAZE_ENDPOINT
        scope: RUN_TIME
        value: ${BACKBLAZE_ENDPOINT}
      - key: BACKBLAZE_REGION
        scope: RUN_TIME
        value: ${BACKBLAZE_REGION}
      - key: BACKBLAZE_KEY_ID
        scope: RUN_TIME
        value: ${BACKBLAZE_KEY_ID}
      - key: BACKBLAZE_APPLICATION_KEY
        scope: RUN_TIME
        value: ${BACKBLAZE_APPLICATION_KEY}
      - key: BACKBLAZE_BUCKET_NAME
        scope: RUN_TIME
        value: ${BACKBLAZE_BUCKET_NAME}
