name: garchen-archive-webui-preview
region: nyc

services:
  - name: garchen-archive-webui
    # Preview builds from source (per PR)
    dockerfile_path: Dockerfile
    source_dir: /

    github:
      branch: main
      deploy_on_push: false
      repo: garchen-archive/asset-preprocess-ui

    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    envs:
      # Non-sensitive configuration
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

      # Database (injected from GitHub Secrets)
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${DATABASE_URL}

      # Auth
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: ${APP_URL}
      - key: NEXTAUTH_SECRET
        scope: RUN_TIME
        value: ${NEXTAUTH_SECRET}

      # App URL
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_TIME
        value: ${APP_URL}

      # Backblaze B2 Storage
      - key: BACKBLAZE_ENDPOINT
        scope: RUN_TIME
        value: ${BACKBLAZE_ENDPOINT}
      - key: BACKBLAZE_REGION
        scope: RUN_TIME
        value: ${BACKBLAZE_REGION}
      - key: BACKBLAZE_KEY_ID
        scope: RUN_TIME
        value: ${BACKBLAZE_KEY_ID}
      - key: BACKBLAZE_APPLICATION_KEY
        scope: RUN_TIME
        value: ${BACKBLAZE_APPLICATION_KEY}
      - key: BACKBLAZE_BUCKET_NAME
        scope: RUN_TIME
        value: ${BACKBLAZE_BUCKET_NAME}

      # Content Processing Pipeline
      - key: PIPELINE_API_URL
        scope: RUN_TIME
        value: ${PIPELINE_API_URL}
      - key: PIPELINE_API_KEY
        scope: RUN_TIME
        value: ${PIPELINE_API_KEY}
