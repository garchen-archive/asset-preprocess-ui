name: garchen-archive-webui-preview
region: nyc

services:
  - name: garchen-archive-webui
    # Preview builds from source (per PR)
    dockerfile_path: Dockerfile
    source_dir: /web-ui

    github:
      branch: main
      deploy_on_push: false
      repo: garchen-archive/garchen-archive-tools

    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    envs:
      # Non-sensitive configuration
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

      # Database (injected from GitHub Secrets)
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${DATABASE_URL}

      # Auth (injected from GitHub Secrets)
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: ${NEXTAUTH_URL}
      - key: NEXTAUTH_SECRET
        scope: RUN_TIME
        value: ${NEXTAUTH_SECRET}

      # App URL
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_TIME
        value: ${NEXTAUTH_URL}
